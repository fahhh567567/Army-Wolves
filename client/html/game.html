```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Army Wolves</title>

    <link rel="stylesheet" href="../css/play.css">
</head>

<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen">

        <div class="panel">

            <h1>Army Wolves</h1>

            <input
                id="username"
                type="text"
                placeholder="Username">

            <input
                id="password"
                type="password"
                placeholder="Password">

            <button id="loginBtn">
                Login
            </button>

        </div>

    </div>

    <!-- SERVER SELECT -->
    <div id="serverScreen" class="screen" hidden>

        <div class="panel">

            <h1>Select Server</h1>

            <button id="joinBtn">
                World 1
            </button>

        </div>

    </div>

    <!-- LOADING -->
    <div id="loadingScreen" class="screen" hidden>

        <div class="panel">

            <h1>Loading...</h1>

            <p>Connecting to server...</p>

        </div>

    </div>

    <!-- ACTUAL GAME -->
    <div id="gameScreen" hidden>

        <div id="page">

            <div id="gameBox">

                <canvas id="game"></canvas>

            </div>

        </div>

    </div>

    <script>

function showScreen(id) {

    document
        .querySelectorAll(".screen")
        .forEach(screen => {
            screen.hidden = true;
        });

    document.getElementById("gameScreen").hidden = true;

    document.getElementById(id).hidden = false;
}


// ----------------------
// LOGIN (HTTP)
// ----------------------
document
    .getElementById("loginBtn")
    .addEventListener("click", async () => {

        const username =
            document.getElementById("username").value.trim();

        const password =
            document.getElementById("password").value;

        if (!username || !password) {
            alert("Enter username and password");
            return;
        }

        try {

            const res = await fetch("/api/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    password
                })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.error || "Login failed");
                return;
            }

            console.log("LOGIN SUCCESS:", data.user);

            window.currentUser = data.user;

            showScreen("serverScreen");

        } catch (err) {

            console.error(err);
            alert("Server error");

        }

    });


// ----------------------
// SERVER SELECT → WEBSOCKET HANDSHAKE
// ----------------------
let ws;

document
    .getElementById("joinBtn")
    .addEventListener("click", () => {

        showScreen("loadingScreen");

        ws = new WebSocket("ws://localhost:3000");

        ws.onopen = () => {

            ws.send(JSON.stringify({
                type: "auth",
                user: window.currentUser
            }));

        };

        ws.onmessage = (msg) => {

            const data = JSON.parse(msg.data);

            if (data.type === "init") {

                console.log("Connected as:", data.id);

                showScreen("gameScreen");
            }
        };

    });
    </script>

    <script type="module" src="../main.js"></script>

</body>
</html>
```
